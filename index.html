<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ur_prgmr_annie</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(135deg,#020617,#1e3a8a);
color:white;overflow-x:hidden;
transition:0.3s;
}

/* LIGHT MODE */
body.light{
background:#f1f5f9;
color:#111;
}

/* NAV */
nav{
display:flex;justify-content:space-between;
padding:20px 60px;position:sticky;top:0;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
}

nav a{color:inherit;margin-left:20px;text-decoration:none;}

/* HERO */
.hero{
display:flex;align-items:center;justify-content:center;
gap:50px;flex-wrap:wrap;padding:120px 20px;
}

.hero h1{font-size:50px;}
.typing{color:#60a5fa;}

/* PROFILE */
.profile{
width:250px;height:250px;border-radius:50%;
object-fit:cover;border:4px solid #60a5fa;
box-shadow:0 0 40px #60a5fa;
animation:float 3s infinite;
}
@keyframes float{50%{transform:translateY(-15px);}}

/* BUTTON */
.btn{
margin-top:15px;padding:10px 25px;
border:none;border-radius:25px;
background:#3b82f6;color:white;cursor:pointer;
}

/* SECTION */
.section{padding:80px 60px;}

.card{
background:rgba(255,255,255,0.05);
border-radius:20px;padding:20px;margin:10px;
transition:0.4s;
transform-style:preserve-3d;
}

.card:hover{
transform:rotateY(10deg) scale(1.05);
box-shadow:0 0 30px #60a5fa;
}

.flex{display:flex;flex-wrap:wrap;justify-content:center;}

/* IMAGE */
img{width:150px;height:150px;object-fit:cover;border-radius:15px;}

/* MODAL */
.modal{
display:none;position:fixed;width:100%;height:100%;
background:rgba(0,0,0,0.7);
}

.modal-content{
background:#1e293b;margin:10% auto;
padding:30px;width:80%;max-width:500px;
border-radius:20px;
}

.close{float:right;cursor:pointer;font-size:25px;}

/* SKILLS */
.bar{background:#1e293b;border-radius:10px;margin:5px 0;}
.bar div{height:10px;background:#60a5fa;border-radius:10px;}

/* PARTICLES */
#particles{
position:fixed;width:100%;height:100%;
z-index:-1;
}

/* CURSOR */
.cursor{
position:fixed;width:15px;height:15px;
background:#60a5fa;border-radius:50%;
pointer-events:none;filter:blur(8px);
}

.hidden{opacity:0;transform:translateY(40px);transition:1s;}
.show{opacity:1;transform:translateY(0);}

footer{text-align:center;padding:20px;}
</style>
</head>

<body>

<canvas id="particles"></canvas>
<div class="cursor"></div>

<nav>
<h2>MyPortfolio</h2>
<div>
<a href="#about">About</a>
<a href="#projects">Projects</a>
<a href="#skills">Skills</a>
<button class="btn" onclick="toggleMode()">🌙</button>
</div>
</nav>

<!-- HERO -->
<div class="hero">
<div>
<h1>Hello, I'm <span class="typing"></span></h1>
<p>Information Technology | Student</p>
<button class="btn" onclick="openModal('About Me','I am a passionate IT student.')">More About Me</button>
</div>

<img src="https://res.cloudinary.com/doxofddj5/image/upload/v1776249649/Untitled_design_hscfay.png" class="profile">
</div>

<!-- ABOUT -->
<div class="section hidden" id="about">
<h2>👤 Personal Info</h2>
<div class="card">
<p><b>Name:</b> Trecia Anne Gandia</p>
<p><b>Age:</b> 21</p>
<p><b>Location:</b> Oriental Mindoro, Philippines</p>
</div>
</div>

<!-- PROJECTS -->
<div class="section hidden" id="projects">
<h2>💻 Projects</h2>
<div class="flex">

<div class="card" onclick="openModal('Technopreneurship','Business system project')">
<img src="https://res.cloudinary.com/doxofddj5/image/upload/v1776251748/sewsera_h25ibl.png">
<p>Technopreneurship</p>
</div>

<div class="card" onclick="openModal('Startup','Startup system')">
<img src="https://res.cloudinary.com/doxofddj5/image/upload/v1776251795/DAYO_123_rs6adt.png">
<p>Startup</p>
</div>

</div>
</div>

<!-- SKILLS -->
<div class="section hidden" id="skills">
<h2>📊 Skills</h2>

<p>HTML</p>
<div class="bar"><div style="width:90%"></div></div>

<p>CSS</p>
<div class="bar"><div style="width:85%"></div></div>

<p>JavaScript</p>
<div class="bar"><div style="width:75%"></div></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<span class="close">&times;</span>
<div id="modal-body"></div>
</div>
</div>

<footer>© 2026 My Portfolio</footer>

<script>

// DARK MODE
function toggleMode(){
document.body.classList.toggle("light");
}

// TYPING
const words=["Trecia Anne","a Developer","a Designer"];
let i=0,j=0,isDeleting=false;

function type(){
let word=words[i];
document.querySelector(".typing").innerHTML=word.substring(0,j);

if(!isDeleting && j<word.length){j++;setTimeout(type,100);}
else if(isDeleting && j>0){j--;setTimeout(type,50);}
else{isDeleting=!isDeleting;if(!isDeleting)i=(i+1)%words.length;setTimeout(type,1000);}
}
type();

// MODAL
function openModal(title,desc){
document.getElementById("modal").style.display="block";
document.getElementById("modal-body").innerHTML=`<h2>${title}</h2><p>${desc}</p>`;
}
document.querySelector(".close").onclick=()=>modal.style.display="none";
window.onclick=e=>{if(e.target.className==="modal")modal.style.display="none";};

// SCROLL
const obs=new IntersectionObserver(entries=>{
entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add("show");});
});
document.querySelectorAll(".hidden").forEach(el=>obs.observe(el));

// CURSOR
document.addEventListener("mousemove",e=>{
let c=document.querySelector(".cursor");
c.style.top=e.clientY+"px";
c.style.left=e.clientX+"px";
});

// PARTICLES
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:2});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#60a5fa";
ctx.fill();
p.y+=0.5;
if(p.y>canvas.height)p.y=0;
});
requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
